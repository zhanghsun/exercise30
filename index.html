<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mouse Interaction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }

        .box {
            width: 200px;
            height: 150px;
            border: 1px solid #ccc;
            text-align: center;
            padding-top: 30px;
        }

        .text {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        button {
            padding: 6px 15px;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="text" id="text">Hello</div>
    <button id="btn">Button</button>
</div>

<script>
    const btn = document.getElementById("btn");
    const text = document.getElementById("text");

    // Mouse over → change color
    btn.addEventListener("mouseover", () => {
        text.style.color = "pink";
        text.textContent = "Hello";
    });

    // Mouse out → back to normal
    btn.addEventListener("mouseout", () => {
        text.style.color = "black";
        text.textContent = "Hello";
    });

    // Click → change text + color
    btn.addEventListener("click", () => {
        text.style.color = "pink";
        text.textContent = "Mouse Click";
    });
</script>

</body>
</html>
